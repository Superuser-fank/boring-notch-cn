name: 功能建议
description: 提出面向中文用户的改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 使用场景或痛点
      description: 这个建议解决什么问题？从用户角度描述。
      placeholder: 例如：国内用户第一次选择播放器时，不知道应该选“系统正在播放”还是具体播放器。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你希望 Boring Notch CN 怎么改？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 你试过的替代方案
      description: 如果有，请说明目前怎么绕过。
  - type: checkboxes
    id: scope
    attributes:
      label: 范围确认
      options:
        - label: 这个建议不要求把第三方服务名称放进主品牌名。
          required: true
        - label: 这个建议不要求自动发送消息、绕过 macOS 权限或收集隐私数据。
          required: true
