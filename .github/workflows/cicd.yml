name: Build for macOS

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

# https://stackoverflow.com/a/72408109/6942800
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Least-privilege: only needs to read code for building.
permissions:
  contents: read

jobs:
  build:
    name: Build Boring Notch
    strategy:
      matrix:
        platform:
          - macOS
        xcode:
          - ^16
        scheme:
          - boringNotch
    runs-on: macos-latest
    steps:
    - name: Code Checkout
      # TODO: pin to immutable SHA
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - name: Show Xcode version
      run: xcodebuild -version
    - name: Resolve Swift packages
      run: xcodebuild -resolvePackageDependencies -project boringNotch.xcodeproj -scheme ${{ matrix.scheme }}
    - name: Build without signing
      run: |
        xcodebuild build \
          -project boringNotch.xcodeproj \
          -scheme ${{ matrix.scheme }} \
          -configuration Release \
          -destination "platform=${{ matrix.platform }}" \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          DEVELOPMENT_TEAM=""
