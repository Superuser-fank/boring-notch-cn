name: Bug 反馈
description: 报告 Boring Notch CN 的异常行为
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        提交前请先确认你使用的是最新 Release。请不要上传包含 Apple ID、Token、联系人、文件内容或隐私路径的日志。
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要说明你遇到的问题。
      placeholder: 例如：选择网易云音乐后，刘海里没有显示播放信息。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 写出能稳定复现的步骤。
      placeholder: |
        1. 打开 Boring Notch CN
        2. 设置媒体来源为 ...
        3. 播放 ...
        4. 看到 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
      description: 你认为应该发生什么。
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      description: 实际发生了什么。可以附截图，但请先遮挡隐私信息。
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: App 版本
      placeholder: 例如：v2.7.3-cn.23
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS 版本
      placeholder: 例如：macOS 15.5
    validations:
      required: true
  - type: dropdown
    id: music-source
    attributes:
      label: 相关媒体来源
      options:
        - 无关
        - 系统正在播放
        - 网易云音乐
        - QQ 音乐
        - Apple Music
        - Spotify
        - YouTube Music
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: 诊断信息
      description: 如果是媒体或权限问题，请在设置页复制诊断信息后粘贴到这里。提交前请检查隐私。
      render: text
